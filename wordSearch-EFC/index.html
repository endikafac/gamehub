<!DOCTYPE html>
<html lang="es" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA -->
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WordSearch">
    <link rel="apple-touch-icon" href="../icons/icon-192.png">
    <meta name="description" content="WordSearch — Sopa de letras educativa con 10 niveles. Encuentra palabras y aprende definiciones, sinónimos y antónimos.">
    <title>WordSearch — Games Hub</title>

    <!-- Platform design system first -->
    <link rel="stylesheet" href="../platform/platform.css">
    <!-- Game-specific styles -->
    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ══ SCREEN 1: HOME ════════════════════════════════════════════════════════ -->
<main id="main-content">
<section id="ws-screen-home" class="ws-screen active" aria-label="Pantalla de inicio">
<div class="ws-page">

    <div class="ws-home-header">
        <h1 class="ws-home-title" id="ws-game-title">🔍 Word<span>Search</span></h1>
        <p class="ws-home-subtitle" id="ws-game-subtitle">Encuentra palabras y aprende</p>
    </div>

    <p class="ws-section-title" id="ws-section-title">Elige el nivel</p>

    <div class="ws-level-grid" id="ws-level-grid" role="listbox" aria-label="Niveles disponibles">
        <!-- Generated by JS -->
    </div>

    <div id="ws-level-desc" class="ws-level-desc" aria-live="polite">
        Selecciona un nivel para comenzar
    </div>

    <div class="ws-home-actions">
        <button class="ws-btn ws-btn-primary" id="ws-start-btn" disabled>
            Empezar
        </button>
    </div>

    <div class="ws-quick-links">
        <button class="ws-quick-link-btn" id="ws-stats-btn">📊 Estadísticas</button>
        <button class="ws-quick-link-btn" id="ws-achievements-btn">🏆 Logros</button>
    </div>

</div>
</section>

<!-- ══ SCREEN 2: GAME ════════════════════════════════════════════════════════ -->
<section id="ws-screen-game" class="ws-screen" aria-label="Pantalla de juego">
<div class="ws-page">

    <div class="ws-game-header">
        <span class="ws-level-badge" id="ws-level-badge">Nivel 1</span>
    </div>

    <!-- HUD -->
    <div class="ws-hud">
        <div class="ws-stat">
            <div class="ws-stat-val" id="ws-words-val" aria-live="polite" aria-label="Palabras encontradas">0/0</div>
            <div class="ws-stat-lbl" id="ws-words-lbl">Palabras</div>
        </div>
        <div class="ws-stat">
            <div class="ws-stat-val" id="ws-time-val" aria-label="Tiempo transcurrido">0:00</div>
            <div class="ws-stat-lbl" id="ws-time-lbl">Tiempo</div>
        </div>
    </div>
    <div id="ws-sr-announce" aria-live="polite" aria-atomic="true" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;"></div>

    <!-- Word list -->
    <div class="ws-word-list" id="ws-word-list" aria-label="Palabras a encontrar">
        <!-- Generated by JS -->
    </div>

    <!-- Loading indicator -->
    <div id="ws-loading" class="ws-loading hidden" aria-live="polite" role="status">
        <div class="ws-loading-spinner" aria-hidden="true"></div>
        <span>Generando...</span>
    </div>

    <!-- Grid -->
    <div id="ws-grid-container" role="application" aria-label="Cuadrícula de la sopa de letras">
        <!-- Grid rendered by JS -->
    </div>

    <!-- Quit -->
    <div class="ws-game-footer">
        <button class="ws-btn ws-btn-ghost" id="ws-quit-btn">Salir</button>
    </div>

</div>
</section>

<!-- ══ SCREEN 3: RESULTS ═════════════════════════════════════════════════════ -->
<section id="ws-screen-results" class="ws-screen" aria-label="Pantalla de resultados">
<div class="ws-page">

    <div class="ws-result-card">
        <h2 class="ws-result-title" id="ws-result-title">¡Resultados!</h2>

        <div class="ws-stars" id="ws-stars" aria-label="Estrellas obtenidas">⭐⭐⭐</div>

        <div class="ws-result-big" id="ws-final-words" aria-live="polite">0 / 0</div>
        <div class="ws-result-big-lbl" id="ws-result-words-lbl">palabras encontradas</div>

        <div class="ws-result-grid">
            <div class="ws-result-item">
                <div class="ws-result-item-val" id="ws-final-time">0:00</div>
                <div class="ws-result-item-lbl" id="ws-result-time-lbl">Tiempo</div>
            </div>
            <div class="ws-result-item">
                <div class="ws-result-item-val" id="ws-final-score">0</div>
                <div class="ws-result-item-lbl" id="ws-result-score-lbl">Puntos</div>
            </div>
            <div class="ws-result-item">
                <div class="ws-result-item-val" id="ws-final-level">1</div>
                <div class="ws-result-item-lbl">Nivel</div>
            </div>
        </div>

        <div class="ws-new-record hidden" id="ws-new-record">🏆 ¡Nuevo récord!</div>

        <div class="ws-achievements-unlocked hidden" id="ws-achievements-unlocked">
            <!-- Achievement badges inserted by JS -->
        </div>

        <div class="ws-result-btns">
            <button class="ws-btn ws-btn-secondary" id="ws-retry-btn">Reintentar</button>
            <button class="ws-btn ws-btn-primary"   id="ws-next-btn">Siguiente nivel</button>
            <button class="ws-btn ws-btn-ghost"     id="ws-menu-btn">Menú</button>
        </div>
    </div>

</div>
</section>
</main>

<!-- Quit confirmation dialog -->
<div id="ws-quit-modal" class="ws-quit-modal hidden" role="dialog" aria-modal="true" aria-labelledby="ws-quit-title" tabindex="-1">
    <div class="ws-quit-dialog">
        <h3 id="ws-quit-title">¿Salir del juego?</h3>
        <p id="ws-quit-msg">Se perderá el progreso actual.</p>
        <div class="ws-quit-actions">
            <button class="ws-btn ws-btn-secondary" id="ws-quit-cancel">Cancelar</button>
            <button class="ws-btn ws-btn-primary" id="ws-quit-ok">Salir</button>
        </div>
    </div>
</div>

<!-- ══ Scripts ════════════════════════════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore-compat.js"></script>
<script src="../platform/firebase-config.js"></script>
<script src="../platform/i18n-platform.js"></script>
<script src="../platform/auth.js"></script>
<script src="../platform/firestore.js"></script>
<script src="../platform/achievements.js"></script>
<script src="../platform/platform-header.js"></script>
<script src="words.js"></script>
<script src="game.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    PlatformHeader.init({ gameName: 'WordSearch', gameIcon: '🔍', rootPath: '../' });
    WordSearchGame.init();

    // Show level on results screen
    const origRender = WordSearchGame._renderResults.bind(WordSearchGame);
    WordSearchGame._renderResults = function(opts) {
        origRender(opts);
        const lvEl = document.getElementById('ws-final-level');
        if (lvEl) lvEl.textContent = this._level;
    };
});
</script>
    <script src="../platform/register-sw.js"></script>
</body>
</html>
