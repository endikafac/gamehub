<!DOCTYPE html>
<html lang="es" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA -->
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Crucigrama">
    <link rel="apple-touch-icon" href="../icons/icon-192.png">
    <meta name="description" content="Crucigrama — Juego educativo de palabras cruzadas con 10 niveles. Aprende vocabulario, geografía, ciencia e historia.">
    <title>Crucigrama — Games Hub</title>
    <link rel="stylesheet" href="../platform/platform.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ══ SCREEN 1: HOME ═══════════════════════════════════════ -->
<main id="main-content">
<section id="cw-screen-home" class="cw-screen active" role="main" aria-label="Pantalla de inicio">
<div class="cw-page">

    <div class="cw-home-header">
        <h1 class="cw-home-title" id="cw-title">✏️ Cruci<span>grama</span></h1>
        <p class="cw-home-subtitle" id="cw-subtitle">Palabras cruzadas educativas</p>
    </div>

    <!-- Category selector -->
    <div class="cw-category-row">
        <label class="cw-category-label" id="cw-cat-label" for="cw-category-select">Categoría:</label>
        <select class="cw-category-select" id="cw-category-select" aria-label="Seleccionar categoría">
            <!-- populated by JS -->
        </select>
    </div>

    <!-- Level grid -->
    <p class="cw-section-title" id="cw-level-section-title">Elige el nivel</p>
    <div class="cw-level-grid" id="cw-level-grid" role="listbox" aria-label="Niveles disponibles">
        <!-- Generated by JS -->
    </div>

    <div class="cw-home-actions">
        <button class="cw-btn cw-btn-primary" id="cw-start-btn" disabled>Empezar</button>
    </div>

    <div class="cw-quick-links">
        <button class="cw-quick-link-btn" id="cw-stats-btn">📊 Estadísticas</button>
        <button class="cw-quick-link-btn" id="cw-achievements-btn">🏆 Logros</button>
    </div>

</div>
</section>

<!-- ══ SCREEN 2: GAME ═══════════════════════════════════════ -->
<section id="cw-screen-game" class="cw-screen" aria-label="Pantalla de juego">
<div class="cw-page">

    <!-- Clue bar (sticky top) -->
    <div class="cw-clue-bar" id="cw-clue-bar" aria-live="polite" aria-atomic="false">
        <span class="cw-clue-dir" id="cw-clue-dir" aria-hidden="true">→</span>
        <span class="cw-clue-num" id="cw-clue-num">1</span>
        <span class="cw-clue-text" id="cw-clue-text">-</span>
    </div>

    <!-- HUD -->
    <div class="cw-hud" aria-live="polite" aria-atomic="true">
        <div class="cw-stat">
            <div class="cw-stat-val" id="cw-time-val" aria-label="Tiempo transcurrido">0:00</div>
            <div class="cw-stat-lbl" id="cw-time-lbl">Tiempo</div>
        </div>
        <div class="cw-stat">
            <div class="cw-stat-val" id="cw-words-val" aria-label="Palabras completadas">0/0</div>
            <div class="cw-stat-lbl" id="cw-words-lbl">Palabras</div>
        </div>
        <div class="cw-stat">
            <div class="cw-stat-val" id="cw-score-val" aria-label="Puntuación">0</div>
            <div class="cw-stat-lbl" id="cw-score-lbl">Puntos</div>
        </div>
    </div>

    <!-- Grid -->
    <div id="cw-grid-container" role="application" aria-label="Crucigrama">
        <!-- Rendered by JS -->
    </div>

    <!-- Action buttons -->
    <div class="cw-action-btns">
        <button class="cw-btn cw-btn-secondary" id="cw-check-word-btn">Verificar</button>
        <button class="cw-btn cw-btn-secondary" id="cw-check-all-btn">Verificar todo</button>
        <button class="cw-btn cw-btn-ghost" id="cw-reveal-btn">Revelar</button>
        <button class="cw-btn cw-btn-ghost" id="cw-quit-btn">Salir</button>
    </div>

    <!-- Clue list tabs -->
    <div class="cw-clue-tabs" role="tablist">
        <button class="cw-tab active" id="cw-tab-across" role="tab" aria-selected="true">Horizontales</button>
        <button class="cw-tab" id="cw-tab-down" role="tab" aria-selected="false">Verticales</button>
    </div>
    <div class="cw-clue-list" id="cw-clue-list" role="list" aria-label="Lista de pistas">
        <!-- Rendered by JS -->
    </div>

</div>
</section>

<!-- ══ SCREEN 3: RESULTS ════════════════════════════════════ -->
<section id="cw-screen-results" class="cw-screen" aria-label="Pantalla de resultados">
<div class="cw-page">

    <div class="cw-result-card">
        <h2 class="cw-result-title" id="cw-result-title">¡Resultados!</h2>

        <div class="cw-stars" id="cw-stars" aria-label="Estrellas obtenidas">⭐⭐⭐</div>

        <div class="cw-result-big" id="cw-result-words" aria-live="polite">0 / 0</div>
        <div class="cw-result-big-lbl" id="cw-result-words-lbl">palabras correctas</div>

        <div class="cw-result-grid">
            <div class="cw-result-item">
                <div class="cw-result-item-val" id="cw-result-time">0:00</div>
                <div class="cw-result-item-lbl" id="cw-result-time-lbl">Tiempo</div>
            </div>
            <div class="cw-result-item">
                <div class="cw-result-item-val" id="cw-result-score">0</div>
                <div class="cw-result-item-lbl" id="cw-result-score-lbl">Puntos</div>
            </div>
            <div class="cw-result-item">
                <div class="cw-result-item-val" id="cw-result-level">1</div>
                <div class="cw-result-item-lbl">Nivel</div>
            </div>
        </div>

        <div class="cw-new-record hidden" id="cw-new-record">🏆 ¡Nuevo récord!</div>

        <div class="cw-achievements-unlocked hidden" id="cw-achievements-unlocked">
            <!-- Achievement badges inserted by JS -->
        </div>

        <div class="cw-result-btns">
            <button class="cw-btn cw-btn-secondary" id="cw-retry-btn">Reintentar</button>
            <button class="cw-btn cw-btn-primary"   id="cw-next-btn">Siguiente nivel</button>
            <button class="cw-btn cw-btn-ghost"     id="cw-menu-btn">Menú</button>
        </div>
    </div>

</div>
</section>

</main>

<!-- ══ Quit confirmation dialog ═════════════════════════════ -->
<div id="cw-quit-modal" class="cw-quit-modal hidden" role="dialog" aria-modal="true" aria-labelledby="cw-quit-title" tabindex="-1">
    <div class="cw-quit-dialog">
        <h3 id="cw-quit-title">¿Salir del crucigrama?</h3>
        <p id="cw-quit-msg">Se perderá el progreso actual.</p>
        <div class="cw-quit-actions">
            <button class="cw-btn cw-btn-secondary" id="cw-quit-cancel">Cancelar</button>
            <button class="cw-btn cw-btn-primary" id="cw-quit-ok">Salir</button>
        </div>
    </div>
</div>

<!-- ══ Scripts ══════════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore-compat.js"></script>
<script src="../platform/firebase-config.js"></script>
<script src="../platform/i18n-platform.js"></script>
<script src="../platform/auth.js"></script>
<script src="../platform/firestore.js"></script>
<script src="../platform/achievements.js"></script>
<script src="../platform/platform-header.js"></script>
<script src="clues.js"></script>
<script src="generator.js"></script>
<script src="game.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    PlatformHeader.init({ gameName: 'Crucigrama', gameIcon: '✏️', rootPath: '../' });
    CrosswordGame.init();
});
</script>
    <script src="../platform/register-sw.js"></script>
</body>
</html>
